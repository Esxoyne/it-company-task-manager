services:
  db:
    image: postgres:trixie
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - static_data:/app/staticfiles
    env_file:
      - .env
    command: sh -c "gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"

volumes:
  pgdata:
  static_data:
